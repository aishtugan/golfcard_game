plugins {
    id 'java'
    id 'application'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'org.example.Main'
}

jar {
    archiveFileName = 'golf-solitaire.jar'
    manifest {
        attributes 'Main-Class': application.mainClass.get()
    }
}

tasks.register('packageWindowsAppImage', Exec) {
    dependsOn jar
    group = 'distribution'
    description = 'Builds a Windows app image with a GolfSolitaire.exe launcher using jpackage.'

    doFirst {
        delete "$buildDir/jpackage"
    }

    commandLine 'jpackage',
            '--type', 'app-image',
            '--input', "$buildDir/libs",
            '--name', 'GolfSolitaire',
            '--main-jar', 'golf-solitaire.jar',
            '--main-class', application.mainClass.get(),
            '--dest', "$buildDir/jpackage"
}

test {
    useJUnitPlatform()
}
